<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة شطرنج الجندول - رابط سريع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --accent: #00ffcc; --bg: #050505; --panel: #111; --danger: #ff3333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .conn-panel { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; width: 100%; max-width: 840px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn-invite { padding: 12px 25px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; transition: 0.3s; }
        .btn-invite:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent); }
        #conn-status { margin-top: 10px; display: block; color: #888; font-size: 0.9em; font-weight: bold; }

        .tabs { display: flex; gap: 8px; background: var(--panel); padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .tabs button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #222; color: #888; transition: 0.3s; }
        .tabs button.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        .main-wrapper { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1100px; }
        #board { width: 480px; border: 6px solid #222; border-radius: 4px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        .sidebar { width: 340px; background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #333; height: 500px; display: flex; flex-direction: column; box-sizing: border-box; }
        .status-box { background: #000; padding: 15px; border-radius: 10px; border: 1px solid var(--accent); text-align: center; margin-bottom: 15px; }
        #status-txt { font-weight: bold; color: var(--accent); font-size: 1.1em; }
        .log { flex-grow: 1; overflow-y: auto; background: #000; padding: 10px; font-family: monospace; font-size: 14px; color: #aaa; border: 1px solid #222; border-radius: 5px; }
        .nav-btn { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: var(--accent); color: #000; font-weight: bold; font-size: 20px; }
        .reset-btn { margin-top: 10px; padding: 12px; background: var(--danger); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div class="conn-panel">
        <button class="btn-invite" onclick="copyInviteLink()">اضغط هنا لنسخ رابط دعوة صاحبك 🔗</button>
        <div id="conn-status">جاري تهيئة النظام...</div>
    </div>

    <div class="tabs">
        <button id="tab-std" onclick="changeMode('standard')">شطرنج عادي</button>
        <button id="tab-free" onclick="changeMode('pawnfree')">حرية بيادق (2-2)</button>
        <button id="tab-mar" onclick="changeMode('marseille')">مارسيليا صارم</button>
        <button id="tab-prog" onclick="changeMode('progressive')">تراكمي (1-2..)</button>
    </div>

    <div class="main-wrapper">
        <div id="board"></div>
        <div class="sidebar">
            <div class="status-box"><div id="status-txt">في انتظار الاتصال...</div></div>
            <div id="log" class="log"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button class="nav-btn" onclick="goStart()">«</button>
                <button class="nav-btn" onclick="goPrev()">‹</button>
                <button class="nav-btn" onclick="goNext()">›</button>
                <button class="nav-btn" onclick="goLast()">»</button>
            </div>
            <button class="reset-btn" onclick="broadcastReset()">إعادة بدء المباراة</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        var board = null, game = new Chess();
        var currentMode = 'standard', moveStep = 1, seriesLimit = 1, movesDone = 0;
        var historyState = [], currentIdx = 0;
        var myId = null, conn = null, myRole = null;

        const peer = new Peer();

        peer.on('open', (id) => {
            myId = id;
            $('#conn-status').text('جاهز! انسخ الرابط وابعته لصاحبك.');
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) connectToPeer(joinId);
        });

        peer.on('connection', (c) => {
            conn = c; myRole = 'w';
            setupConnListeners();
            $('#conn-status').text('تم الاتصال! أنت تلعب بالأبيض.').css('color', '#00ffcc');
            updateUI();
        });

        function connectToPeer(id) {
            conn = peer.connect(id); myRole = 'b';
            setupConnListeners();
            $('#conn-status').text('تم الاتصال! أنت تلعب بالأسود.').css('color', '#00ffcc');
            updateUI();
        }

        function copyInviteLink() {
            if (!myId) return alert("انتظر ثانية حتى يجهز النظام.");
            const link = window.location.origin + window.location.pathname + "?join=" + myId;
            navigator.clipboard.writeText(link).then(() => {
                alert("تم نسخ الرابط! ابعته لصاحبك على الواتساب.");
            });
        }

        function setupConnListeners() {
            conn.on('data', (data) => {
                if (data.type === 'move') {
                    game.load(data.fen);
                    moveStep = data.moveStep; seriesLimit = data.seriesLimit;
                    movesDone = data.movesDone; currentMode = data.mode;
                    historyState.push(game.fen()); currentIdx = historyState.length - 1;
                    syncTabsUI(); updateUI();
                } else if (data.type === 'reset') { resetGame(false); }
                else if (data.type === 'mode') { setMode(data.mode, false); }
            });
        }

        function changeMode(m) { setMode(m, true); }
        function setMode(mode, broadcast) {
            currentMode = mode; syncTabsUI();
            if (broadcast && conn) conn.send({type: 'mode', mode: mode});
            resetGame(broadcast);
        }
        function syncTabsUI() {
            $(".tabs button").removeClass("active");
            let id = currentMode === 'standard' ? 'std' : (currentMode === 'marseille' ? 'mar' : (currentMode === 'progressive' ? 'prog' : 'free'));
            $("#tab-" + id).addClass("active");
        }

        function resetGame(broadcast) {
            game = new Chess(); moveStep = 1; seriesLimit = 1; movesDone = 0;
            historyState = [game.fen()]; currentIdx = 0;
            $("#log").empty();
            if (broadcast && conn) conn.send({type: 'reset'});
            updateUI();
        }
        function broadcastReset() { resetGame(true); }

        function onDragStart(s, p) {
            if (game.game_over() || currentIdx !== historyState.length - 1) return false;
            if (conn && game.turn() !== myRole) return false;
            if ((game.turn() === 'w' && p.search(/^b/) !== -1) || (game.turn() === 'b' && p.search(/^w/) !== -1)) return false;
        }

        function onDrop(source, target) {
            let startedCheck = game.in_check();
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            addLog(move.san);
            let deliveredCheck = game.in_check();

            if (currentMode === 'pawnfree') {
                if (moveStep === 1 && !deliveredCheck && !game.game_over()) {
                    moveStep = 2; forceKeepTurn();
                } else { moveStep = 1; }
            } else if (currentMode === 'marseille') {
                if (game.history().length === 1) { moveStep = 1; }
                else if (moveStep === 1) {
                    if (deliveredCheck || startedCheck || game.game_over()) { moveStep = 1; }
                    else { moveStep = 2; forceKeepTurn(); }
                } else { moveStep = 1; }
            } else if (currentMode === 'progressive') {
                movesDone++;
                if (deliveredCheck || movesDone >= seriesLimit || game.game_over()) {
                    seriesLimit++; movesDone = 0;
                } else { forceKeepTurn(); }
            }

            historyState.push(game.fen());
            currentIdx = historyState.length - 1;
            if (conn) conn.send({ type: 'move', fen: game.fen(), moveStep: moveStep, seriesLimit: seriesLimit, movesDone: movesDone, mode: currentMode });
            updateUI();
        }

        function forceKeepTurn() {
            var f = game.fen().split(' ');
            f[1] = (f[1] === 'w' ? 'b' : 'w'); f[3] = '-';
            game.load(f.join(' '));
        }

        function addLog(san) {
            var p = (game.turn() === 'b' ? 'الأبيض' : 'الأسود');
            $("#log").prepend(`<div><b>${p}:</b> ${san}</div>`);
        }

        function updateUI() {
            var p = (game.turn() === 'w' ? 'الأبيض' : 'الأسود');
            var status = (currentMode === 'standard') ? `دور ${p}` : 
                         (currentMode === 'progressive') ? `دور ${p} (${movesDone + 1}/${seriesLimit})` : 
                         `دور ${p} (نقلة ${moveStep}/2)`;
            if (game.in_checkmate()) status = "كش ملك! انتهى الجيم.";
            $("#status-txt").text(status);
            board.position(game.fen());
        }

        function goStart() { currentIdx = 0; board.position(historyState[0]); }
        function goPrev() { if (currentIdx > 0) { currentIdx--; board.position(historyState[currentIdx]); } }
        function goNext() { if (currentIdx < historyState.length - 1) { currentIdx++; board.position(historyState[currentIdx]); } }
        function goLast() { currentIdx = historyState.length - 1; board.position(historyState[currentIdx]); }

        $(document).ready(function() {
            board = Chessboard('board', {
                draggable: true, position: 'start', onDragStart: onDragStart, onDrop: onDrop,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            updateUI();
        });
    </script>
</body>
</html>
