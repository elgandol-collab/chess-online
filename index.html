<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Chess Online - PeerJS Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --accent: #00ffcc; --bg: #050505; --panel: #111; --danger: #ff3333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* لوحة الاتصال */
        .online-panel { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; width: 100%; max-width: 840px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .id-box { background: #000; padding: 8px; border: 1px solid var(--accent); color: var(--accent); border-radius: 5px; font-family: monospace; font-size: 1.1em; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; flex: 1; }
        .btn-conn { padding: 8px 15px; background: var(--accent); color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .tabs { display: flex; gap: 8px; background: var(--panel); padding: 12px; border-radius: 12px; border: 1px solid #333; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .tabs button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; background: #222; color: #888; transition: 0.3s; }
        .tabs button.active { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        /* ── Layout ── */
        .main-wrapper { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 1200px; align-items: flex-start; }

        /* ── Board + side clocks ── */
        .board-area { display: flex; gap: 10px; align-items: stretch; }
        #board { width: 560px; border: 6px solid #222; border-radius: 4px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); flex-shrink: 0; }

        /* ساعات جانبية */
        .side-clocks { display: flex; flex-direction: column; justify-content: space-between; width: 90px; }
        .clock-box {
            background: #000; border: 2px solid #333; border-radius: 8px;
            padding: 12px 6px; text-align: center; flex: 1;
        }
        .clock-box:first-child { margin-bottom: 8px; }
        .clock-box.active { border-color: var(--accent); box-shadow: 0 0 14px rgba(0,255,204,.5); }
        .clock-box.low    { border-color: var(--danger); animation: pulse .7s infinite; }
        .clock-label { font-size: .65em; color: #666; margin-bottom: 6px; letter-spacing: 1px; }
        .clock-time  { font-family: monospace; font-size: 1.3em; font-weight: bold; color: var(--accent); word-break: break-all; }
        .clock-box.low .clock-time { color: var(--danger); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        /* ── Sidebar ── */
        .sidebar { width: 300px; background: var(--panel); padding: 16px; border-radius: 15px; border: 1px solid #333; display: flex; flex-direction: column; box-sizing: border-box; }
        .status-box { background: #000; padding: 12px; border-radius: 10px; border: 1px solid var(--accent); text-align: center; margin-bottom: 12px; }
        #status-txt { font-weight: bold; color: var(--accent); font-size: 1em; }
        .log { flex-grow: 1; overflow-y: auto; background: #000; padding: 10px; font-family: monospace; font-size: 13px; color: #aaa; border: 1px solid #222; border-radius: 5px; max-height: 240px; }
        .nav-btn { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: var(--accent); color: #000; font-weight: bold; font-size: 20px; }
        .reset-btn { margin-top: 10px; padding: 12px; background: var(--danger); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }

        /* ── إعدادات الوقت ── */
        .time-ctrl { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .time-ctrl select, .time-ctrl button {
            padding: 6px 8px; background: #222; color: #fff;
            border: 1px solid #444; border-radius: 5px; cursor: pointer; font-size: .8em;
        }
        .time-ctrl button { background: #1a3a2a; color: var(--accent); border-color: var(--accent); font-weight: bold; }
        .time-ctrl button:hover { background: #0a2a1a; }

        /* ── زر فليب ── */
        .flip-btn { padding: 8px 14px; background: #222; color: var(--accent); border: 1px solid var(--accent); border-radius: 5px; cursor: pointer; font-weight: bold; font-size: .85em; white-space: nowrap; }
        .flip-btn:hover { background: #1a3a2a; }

        /* ── رابط الدعوة ── */
        .invite-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; width: 100%; max-width: 840px; margin-bottom: 8px; }
        .invite-link-box { flex: 1; background: #000; border: 1px solid #2a4a3a; border-radius: 5px; padding: 7px 10px; font-family: monospace; font-size: .78em; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; transition: .2s; }
        .invite-link-box:hover { border-color: var(--accent); color: var(--accent); }
        .copy-btn { padding: 7px 12px; background: #1a3a2a; color: var(--accent); border: 1px solid var(--accent); border-radius: 5px; cursor: pointer; font-size: .8em; font-weight: bold; white-space: nowrap; }
        .copy-btn:hover { background: #0a2a1a; }

        /* ── الدردشة ── */
        .chat-box { background: #000; border: 1px solid #222; border-radius: 8px; margin-top: 10px; display: flex; flex-direction: column; max-height: 160px; }
        .chat-header { padding: 6px 10px; border-bottom: 1px solid #222; font-size: .72em; color: #555; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 6px 8px; font-size: .8em; min-height: 60px; }
        .chat-msgs::-webkit-scrollbar { width: 3px; }
        .chat-msgs::-webkit-scrollbar-thumb { background: #333; }
        .chat-msg { margin-bottom: 4px; line-height: 1.4; }
        .chat-msg .who { font-weight: bold; margin-left: 4px; }
        .chat-msg.me .who  { color: var(--accent); }
        .chat-msg.opp .who { color: #aaa; }
        .chat-input-row { display: flex; gap: 4px; padding: 6px; border-top: 1px solid #222; }
        .chat-input { flex: 1; background: #111; border: 1px solid #333; border-radius: 4px; color: #fff; padding: 5px 8px; font-size: .8em; outline: none; }
        .chat-input:focus { border-color: var(--accent); }
        .chat-send { background: var(--accent); color: #000; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-weight: bold; font-size: .8em; }

        /* ── شريط الصوت ── */
        .voice-bar { display: flex; gap: 8px; align-items: center; margin-top: 8px; background: #000; border: 1px solid #222; border-radius: 8px; padding: 8px 10px; }
        .voice-btn { padding: 6px 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: .8em; transition: .2s; }
        .voice-btn.off { background: #222; color: #666; border: 1px solid #444; }
        .voice-btn.on  { background: #1a3a2a; color: var(--accent); border: 1px solid var(--accent); box-shadow: 0 0 8px rgba(0,255,204,.3); }
        .voice-btn.on:hover { background: #0a2a1a; }
        .mic-indicator { width: 8px; height: 8px; border-radius: 50%; background: #333; transition: .3s; }
        .mic-indicator.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse .8s infinite; }
        .voice-status { font-size: .72em; color: #555; flex: 1; }
    </style>
</head>
<body>

    <div class="online-panel">
        <div>الـ ID بتاعك: <span id="my-id" class="id-box">جاري التوليد...</span></div>
        <input type="text" id="peer-id-input" placeholder="حط ID صاحبك هنا">
        <button class="btn-conn" onclick="connectToPeer()">اتصال (Connect)</button>
        <button class="flip-btn" onclick="flipBoard()">&#8645; قلب الرقعة</button>
        <span id="conn-status" style="color: #888; font-size: 0.9em;">غير متصل</span>
    </div>

    <!-- رابط الدعوة التلقائي -->
    <div class="invite-row">
        <span style="font-size:.8em; color:#555; white-space:nowrap;">رابط الدعوة:</span>
        <div class="invite-link-box" id="invite-link" onclick="copyInviteLink()" title="اضغط للنسخ">جاري التوليد...</div>
        <button class="copy-btn" onclick="copyInviteLink()">نسخ</button>
    </div>

    <div class="tabs">
        <button id="tab-std" onclick="changeMode('standard')">شطرنج عادي</button>
        <button id="tab-free" onclick="changeMode('pawnfree')">حرية بيادق (2-2)</button>
        <button id="tab-mar" onclick="changeMode('marseille')">مارسيليا صارم</button>
        <button id="tab-prog" onclick="changeMode('progressive')">تراكمي (1-2..)</button>
    </div>

    <div class="main-wrapper">
        <!-- الرقعة + الساعات الجانبية -->
        <div class="board-area">
            <!-- ساعات على يمين الرقعة -->
            <div class="side-clocks">
                <div class="clock-box" id="clock-b">
                    <div class="clock-label">BLACK</div>
                    <div class="clock-time" id="time-b">05:00</div>
                </div>
                <div class="clock-box active" id="clock-w">
                    <div class="clock-label">WHITE</div>
                    <div class="clock-time" id="time-w">05:00</div>
                </div>
            </div>
            <div id="board"></div>
        </div>

        <div class="sidebar">

            <!-- إعدادات التوقيت -->
            <div class="time-ctrl">
                <select id="time-select">
                    <option value="60">1 دقيقة</option>
                    <option value="180">3 دقائق</option>
                    <option value="300" selected>5 دقائق</option>
                    <option value="600">10 دقائق</option>
                    <option value="900">15 دقيقة</option>
                    <option value="1800">30 دقيقة</option>
                    <option value="0">بدون وقت</option>
                </select>
                <select id="inc-select">
                    <option value="0">+0 ث</option>
                    <option value="2">+2 ث</option>
                    <option value="3">+3 ث</option>
                    <option value="5">+5 ث</option>
                    <option value="10">+10 ث</option>
                </select>
                <button onclick="applyTimeControl()">تطبيق</button>
            </div>

            <div class="status-box"><div id="status-txt">تحميل...</div></div>
            <div id="log" class="log"></div>
            <div style="display:flex; gap:5px; margin-top:10px;">
                <button class="nav-btn" onclick="goStart()">«</button>
                <button class="nav-btn" onclick="goPrev()">‹</button>
                <button class="nav-btn" onclick="goNext()">›</button>
                <button class="nav-btn" onclick="goLast()">»</button>
            </div>
            <button class="reset-btn" onclick="broadcastReset()">إعادة بدء المباراة</button>

            <!-- شريط الصوت -->
            <div class="voice-bar">
                <div class="mic-indicator" id="mic-dot"></div>
                <span class="voice-status" id="voice-status">الصوت متوقف</span>
                <button class="voice-btn off" id="voice-btn" onclick="toggleVoice()">تفعيل الصوت</button>
            </div>

            <!-- الدردشة -->
            <div class="chat-box">
                <div class="chat-header">
                    <span>CHAT</span>
                    <span id="chat-conn-hint" style="color:#333">يتوفر عند الاتصال</span>
                </div>
                <div class="chat-msgs" id="chat-msgs"></div>
                <div class="chat-input-row">
                    <input class="chat-input" id="chat-input" placeholder="اكتب رسالة..." onkeydown="if(event.key==='Enter') sendChat()">
                    <button class="chat-send" onclick="sendChat()">ارسل</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <script>
        // ════════════════════════════════════════
        //  الأصوات
        // ════════════════════════════════════════
        function makeBeep(freq, dur, vol) {
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                var o = ctx.createOscillator();
                var g = ctx.createGain();
                o.connect(g); g.connect(ctx.destination);
                o.frequency.value = freq;
                o.type = 'sine';
                g.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
                o.start(); o.stop(ctx.currentTime + dur);
            } catch(e) {}
        }
        var sfx = {
            move:    function() { makeBeep(440, 0.08, 0.25); },
            capture: function() { makeBeep(220, 0.18, 0.4); setTimeout(function(){ makeBeep(180, 0.12, 0.25); }, 80); },
            check:   function() { makeBeep(600, 0.1, 0.4); setTimeout(function(){ makeBeep(700, 0.15, 0.35); }, 110); },
            end:     function() { [500,400,300].forEach(function(f,i){ setTimeout(function(){ makeBeep(f, 0.25, 0.4); }, i*200); }); },
            tick:    function() { makeBeep(880, 0.04, 0.15); }
        };

        // ════════════════════════════════════════
        //  منطق اللعب الأصلي (بدون تعديل)
        // ════════════════════════════════════════
        var board = null, game = new Chess();
        var currentMode = 'standard', moveStep = 1, seriesLimit = 1, movesDone = 0;
        var historyState = [], currentIdx = 0;
        
        var peer = new Peer(); 
        var conn = null;
        var myRole = null;

        peer.on('open', (id) => {
            $('#my-id').text(id);
            var inviteUrl = location.href.split('?')[0] + '?join=' + encodeURIComponent(id);
            $('#invite-link').text(inviteUrl).attr('data-url', inviteUrl);
        });

        function copyInviteLink() {
            var url = $('#invite-link').attr('data-url') || $('#invite-link').text();
            if (!url || url === 'جاري التوليد...') return;
            navigator.clipboard.writeText(url).then(function() {
                var btn = $('.copy-btn');
                btn.text('تم النسخ!');
                setTimeout(function(){ btn.text('نسخ'); }, 2000);
            }).catch(function() { prompt('انسخ الرابط:', url); });
        }

        peer.on('connection', (c) => {
            conn = c;
            myRole = 'w';
            setupConnListeners();
            $('#conn-status').text('متصل (أنت الأبيض)').css('color', '#00ffcc');
        });

        function connectToPeer() {
            let id = $('#peer-id-input').val();
            if (!id) return alert("حط الـ ID الأول يا هندسة!");
            conn = peer.connect(id);
            myRole = 'b';
            setupConnListeners();
            $('#conn-status').text('متصل (أنت الأسود)').css('color', '#00ffcc');
        }

        function setupConnListeners() {
            conn.on('open', function() { $('#chat-conn-hint').text('متصل').css('color', 'var(--accent)'); });
            conn.on('data', (data) => {
                if (data.type === 'move') {
                    game.load(data.fen);
                    moveStep = data.moveStep;
                    seriesLimit = data.seriesLimit;
                    movesDone = data.movesDone;
                    currentMode = data.mode;
                    // مزامنة الساعة
                    if (data.timers) {
                        timers = data.timers;
                        increment = data.increment;
                        timerStartTS = Date.now();
                        activeColor = data.activeColor;
                        renderClocks();
                    }
                    historyState.push(game.fen());
                    currentIdx = historyState.length - 1;
                    syncTabsUI();
                    updateUI();
                    // صوت عند استقبال النقلة
                    playMoveSound(data.lastMoveFlags, data.inCheck);
                } else if (data.type === 'reset') {
                    resetGame(false);
                } else if (data.type === 'mode') {
                    setMode(data.mode, false);
                } else if (data.type === 'timecontrol') {
                    totalTime = data.totalTime;
                    increment = data.increment;
                    timers = { w: totalTime, b: totalTime };
                    renderClocks();
                } else if (data.type === 'chat') {
                    appendChat(data.text, false);
                }
            });
        }

        function changeMode(m) { setMode(m, true); }

        function setMode(mode, broadcast) {
            currentMode = mode;
            syncTabsUI();
            if (broadcast && conn) conn.send({type: 'mode', mode: mode});
            resetGame(broadcast);
        }

        function syncTabsUI() {
            $(".tabs button").removeClass("active");
            let tabId = currentMode === 'standard' ? 'std' : (currentMode === 'marseille' ? 'mar' : (currentMode === 'progressive' ? 'prog' : 'free'));
            $("#tab-" + tabId).addClass("active");
        }

        function resetGame(broadcast) {
            game = new Chess();
            moveStep = 1; seriesLimit = 1; movesDone = 0;
            historyState = [game.fen()];
            currentIdx = 0;
            $("#log").empty();
            if (broadcast && conn) conn.send({type: 'reset'});
            // إعادة الساعة
            resetTimers();
            updateUI();
        }

        function broadcastReset() { resetGame(true); }

        function onDragStart(s, p) {
            if (game.game_over() || currentIdx !== historyState.length - 1) return false;
            if (conn && game.turn() !== myRole) return false;
            if ((game.turn() === 'w' && p.search(/^b/) !== -1) || (game.turn() === 'b' && p.search(/^w/) !== -1)) return false;
        }

        function onDrop(source, target) {
            let startedCheck = game.in_check();
            let move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            addLog(move.san);
            let deliveredCheck = game.in_check();
            let seriesEnded = false; // هل انتهت السلسلة؟

            if (currentMode === 'pawnfree') {
                if (moveStep === 1 && !deliveredCheck && !game.game_over()) {
                    moveStep = 2; forceKeepTurn();
                } else { moveStep = 1; seriesEnded = true; }
            } else if (currentMode === 'marseille') {
                if (game.history().length === 1) { moveStep = 1; seriesEnded = true; }
                else if (moveStep === 1) {
                    if (deliveredCheck || startedCheck || game.game_over()) { moveStep = 1; seriesEnded = true; }
                    else { moveStep = 2; forceKeepTurn(); }
                } else { moveStep = 1; seriesEnded = true; }
            } else if (currentMode === 'progressive') {
                movesDone++;
                if (deliveredCheck || movesDone >= seriesLimit || game.game_over()) {
                    seriesLimit++; movesDone = 0; seriesEnded = true;
                } else { forceKeepTurn(); }
            } else {
                seriesEnded = true; // standard: كل نقلة تنهي السلسلة
            }

            historyState.push(game.fen());
            currentIdx = historyState.length - 1;

            // تشغيل الصوت
            playMoveSound(move.flags, deliveredCheck);

            // تبديل الساعة فقط عند نهاية السلسلة
            if (seriesEnded) {
                switchClock(move.color);
            }

            if (conn) {
                conn.send({
                    type: 'move',
                    fen: game.fen(),
                    moveStep: moveStep,
                    seriesLimit: seriesLimit,
                    movesDone: movesDone,
                    mode: currentMode,
                    timers: timers,
                    increment: increment,
                    activeColor: activeColor,
                    lastMoveFlags: move.flags,
                    inCheck: deliveredCheck
                });
            }

            updateUI();
            if (game.game_over()) { sfx.end(); stopClock(); }
        }

        function forceKeepTurn() {
            var f = game.fen().split(' ');
            f[1] = (f[1] === 'w' ? 'b' : 'w'); f[3] = '-';
            game.load(f.join(' '));
        }

        function playMoveSound(flags, inCheck) {
            if (game.in_checkmate())      sfx.end();
            else if (inCheck)             sfx.check();
            else if (flags && (flags.includes('c') || flags.includes('e'))) sfx.capture();
            else                          sfx.move();
        }

        function addLog(san) {
            var p = (game.turn() === 'b' ? 'الأبيض' : 'الأسود');
            $("#log").prepend(`<div><b>${p}:</b> ${san}</div>`);
        }

        function updateUI() {
            var p = (game.turn() === 'w' ? 'الأبيض' : 'الأسود');
            var status = (currentMode === 'standard') ? `دور ${p}` : 
                         (currentMode === 'progressive') ? `دور ${p} - نقلة ${movesDone + 1}/${seriesLimit}` : 
                         `دور ${p} - نقلة ${moveStep}/2`;
            if (game.in_checkmate()) status = "كش ملك! انتهى الجيم.";
            $("#status-txt").text(status);
            board.position(game.fen());
        }

        function goStart() { currentIdx = 0; board.position(historyState[0]); }
        function goPrev() { if (currentIdx > 0) { currentIdx--; board.position(historyState[currentIdx]); } }
        function goNext() { if (currentIdx < historyState.length - 1) { currentIdx++; board.position(historyState[currentIdx]); } }
        function goLast() { currentIdx = historyState.length - 1; board.position(historyState[currentIdx]); }

        // ════════════════════════════════════════
        //  فليب الرقعة
        // ════════════════════════════════════════
        function flipBoard() { board.flip(); }

        // ════════════════════════════════════════
        //  التايم كنترول
        // ════════════════════════════════════════
        var totalTime   = 300; // ثانية
        var increment   = 0;   // ثانية إضافية بعد كل نقلة
        var timers      = { w: 300, b: 300 };
        var activeColor = 'w'; // اللون الذي ساعته تدور الآن
        var timerStartTS = null;
        var clockInterval = null;

        function applyTimeControl() {
            var t = parseInt($('#time-select').val());
            var inc = parseInt($('#inc-select').val());
            totalTime = t;
            increment = inc;
            timers = { w: t, b: t };
            activeColor = 'w';
            stopClock();
            renderClocks();
            if (conn) conn.send({ type: 'timecontrol', totalTime: t, increment: inc });
        }

        function resetTimers() {
            stopClock();
            timers = { w: totalTime, b: totalTime };
            activeColor = 'w';
            timerStartTS = null;
            renderClocks();
            $('#clock-w').addClass('active'); $('#clock-b').removeClass('active');
            $('#clock-w').removeClass('low'); $('#clock-b').removeClass('low');
            if (totalTime > 0) startClock();
        }

        function startClock() {
            if (totalTime === 0) return; // وضع بدون وقت
            stopClock();
            timerStartTS = Date.now();
            clockInterval = setInterval(tickClock, 100);
        }

        function stopClock() { clearInterval(clockInterval); clockInterval = null; }

        function tickClock() {
            if (timerStartTS === null) return;
            var elapsed = (Date.now() - timerStartTS) / 1000;
            var remaining = Math.max(0, timers[activeColor] - elapsed);
            renderSingleClock(activeColor, remaining);
            if (remaining < 30) $('#clock-' + activeColor).addClass('low');
            if (remaining <= 0) {
                stopClock();
                timers[activeColor] = 0;
                sfx.end();
                $("#status-txt").text((activeColor === 'w' ? 'الأسود' : 'الأبيض') + ' فاز بنفاد الوقت!');
            }
        }

        function switchClock(movedColor) {
            if (totalTime === 0) return;
            if (timerStartTS !== null) {
                var elapsed = (Date.now() - timerStartTS) / 1000;
                timers[activeColor] = Math.max(0, timers[activeColor] - elapsed) + increment;
                renderSingleClock(activeColor, timers[activeColor]);
            }
            // ── إصلاح: تحديث CSS classes بشكل صريح ──
            activeColor = (activeColor === 'w') ? 'b' : 'w';
            timerStartTS = Date.now();
            $('#clock-w').toggleClass('active', activeColor === 'w').removeClass('low');
            $('#clock-b').toggleClass('active', activeColor === 'b').removeClass('low');
            if (timers[activeColor] < 30) $('#clock-' + activeColor).addClass('low');
        }

        function renderClocks() {
            renderSingleClock('w', timers.w);
            renderSingleClock('b', timers.b);
        }

        function renderSingleClock(color, secs) {
            if (totalTime === 0) { $('#time-' + color).text('∞'); return; }
            var m = Math.floor(secs / 60).toString().padStart(2, '0');
            var s = Math.floor(secs % 60).toString().padStart(2, '0');
            $('#time-' + color).text(m + ':' + s);
        }

        // ════════════════════════════════════════
        //  الدردشة النصية
        // ════════════════════════════════════════
        function sendChat() {
            var txt = $('#chat-input').val().trim();
            if (!txt) return;
            $('#chat-input').val('');
            appendChat(txt, true);
            if (conn && conn.open) conn.send({ type: 'chat', text: txt });
        }
        function appendChat(text, isMe) {
            var who = isMe ? (myRole === 'w' ? 'أبيض' : 'أسود') : (myRole === 'w' ? 'أسود' : 'أبيض');
            var cls = isMe ? 'me' : 'opp';
            var el = $('<div class="chat-msg ' + cls + '"><span class="who">' + who + ':</span>' + $('<span>').text(text).html() + '</div>');
            $('#chat-msgs').append(el);
            $('#chat-msgs').scrollTop($('#chat-msgs')[0].scrollHeight);
        }

        // ════════════════════════════════════════
        //  الصوت / المايك (WebRTC عبر PeerJS)
        // ════════════════════════════════════════
        var localStream   = null;
        var mediaConn     = null;
        var voiceActive   = false;
        var remoteAudio   = new Audio();
        remoteAudio.autoplay = true;

        // عند استقبال مكالمة صوتية
        peer.on('call', function(call) {
            if (!localStream) {
                navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
                    localStream = stream;
                    call.answer(stream);
                    mediaConn = call;
                    call.on('stream', function(remoteStream) {
                        remoteAudio.srcObject = remoteStream;
                        setVoiceUI(true);
                    });
                    call.on('close', function() { setVoiceUI(false); });
                }).catch(function(e) { alert('لا يمكن الوصول للمايك: ' + e.message); });
            } else {
                call.answer(localStream);
                mediaConn = call;
                call.on('stream', function(remoteStream) {
                    remoteAudio.srcObject = remoteStream;
                    setVoiceUI(true);
                });
                call.on('close', function() { setVoiceUI(false); });
            }
        });

        function toggleVoice() {
            if (!conn || !conn.open) { alert('اتصل بالصديق أولاً قبل تفعيل الصوت!'); return; }
            if (!voiceActive) {
                navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
                    localStream = stream;
                    var peerId = myRole === 'b' ? $('#peer-id-input').val().trim() : null;
                    // نتصل بالـ ID المكتوب أو بصاحب الـ conn
                    var targetId = peerId || conn.peer;
                    if (!targetId) { alert('تعذر تحديد الـ ID للمكالمة'); return; }
                    mediaConn = peer.call(targetId, stream);
                    mediaConn.on('stream', function(remoteStream) {
                        remoteAudio.srcObject = remoteStream;
                        setVoiceUI(true);
                    });
                    mediaConn.on('close', function() { setVoiceUI(false); });
                }).catch(function(e) { alert('لا يمكن الوصول للمايك: ' + e.message); });
            } else {
                // إيقاف المكالمة
                if (mediaConn) { mediaConn.close(); mediaConn = null; }
                if (localStream) { localStream.getTracks().forEach(function(t){ t.stop(); }); localStream = null; }
                setVoiceUI(false);
            }
        }

        function setVoiceUI(active) {
            voiceActive = active;
            if (active) {
                $('#voice-btn').text('إيقاف الصوت').removeClass('off').addClass('on');
                $('#mic-dot').addClass('active');
                $('#voice-status').text('مكالمة جارية...').css('color', 'var(--accent)');
            } else {
                $('#voice-btn').text('تفعيل الصوت').removeClass('on').addClass('off');
                $('#mic-dot').removeClass('active');
                $('#voice-status').text('الصوت متوقف').css('color', '#555');
            }
        }

        // ════════════════════════════════════════
        //  تهيئة
        // ════════════════════════════════════════
        $(document).ready(function() {
            board = Chessboard('board', {
                draggable: true, position: 'start', onDragStart: onDragStart, onDrop: onDrop,
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            });
            setMode('standard', false);
            applyTimeControl();
        });
    </script>
</body>
</html>
