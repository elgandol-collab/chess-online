<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Chess Master - vs Computer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        :root { --accent: #00ffcc; --bg: #070707; --panel: #111; --danger: #ff3333; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); color: #fff; 
            margin: 0; padding: 25px; 
            display: flex; justify-content: center;
        }

        /* الحاوية الرئيسية للتصميم الثلاثي (يمين - منتصف - يسار) */
        .app-container {
            display: flex;
            width: 100%;
            max-width: 1450px;
            gap: 25px;
            align-items: flex-start; /* كل عنصر بارتفاعه الطبيعي بدل التمطط لأطول عنصر */
            justify-content: center;
        }

        /* ------------------------------------- */
        /* القوائم الجانبية (يمين ويسار) */
        /* ------------------------------------- */
        .sidebar {
            background: var(--panel);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            height: 750px; /* نفس ارتفاع الرقعة تقريباً، حفاظاً على الاتزان */
            overflow-y: auto;
        }
        
        .right-panel { width: 300px; flex-shrink: 0; }
        .left-panel { width: 300px; flex-shrink: 0; }

        /* ------------------------------------- */
        /* منطقة الرقعة الكبيرة والنظيفة (المنتصف) */
        /* ------------------------------------- */
        .center-panel {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .board-area { 
            display: flex; gap: 15px; align-items: stretch; 
        }
        #board { 
            width: 750px; /* رقعة كبيرة جداً */
            border: 1px solid #222; /* إطار نظيف ورفيع */
            border-radius: 4px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            overflow: hidden;
            background: #222;
        }

        /* ------------------------------------- */
        /* تصميم الساعات */
        /* ------------------------------------- */
        .side-clocks { display: flex; flex-direction: column; justify-content: space-between; width: 95px; }
        .clock-box { background: #0a0a0a; border: 2px solid #1a1a1a; border-radius: 8px; padding: 15px 5px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; transition: 0.3s; }
        .clock-box.active { border-color: var(--accent); box-shadow: 0 0 18px rgba(0,255,204,.25), inset 0 0 15px rgba(0,255,204,.05); background: #0e1512; }
        .clock-box.low { border-color: var(--danger); animation: pulse-low 1s ease-in-out infinite; }
        .clock-label { font-size: .65em; color: #888; margin-bottom: 5px; letter-spacing: 1px; font-weight: bold;}
        .clock-box.active .clock-label { color: var(--accent); }
        .clock-time { font-family: monospace; font-size: 1.6em; font-weight: bold; color: var(--accent); transition: color 0.3s; }
        .clock-box.low .clock-time { color: var(--danger); }
        @keyframes pulse-low { 0%,100%{ box-shadow: 0 0 8px rgba(255,51,51,.3); } 50%{ box-shadow: 0 0 20px rgba(255,51,51,.6); opacity:.75; } }

        /* ------------------------------------- */
        /* عناصر لوحة اليسار (الإعدادات) */
        /* ------------------------------------- */
        .profile-box {
            display: flex; align-items: center; gap: 12px; background: #0a1510; 
            padding: 8px; border-radius: 30px; 
            border: 1px solid var(--accent); box-shadow: 0 0 10px rgba(0,255,204,0.1);
            margin-bottom: 15px;
        }
        .profile-img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); background: #222; }
        .profile-name { color: var(--accent); font-weight: bold; font-size: 1em; }

        .settings-group { margin-bottom: 10px; background: #0a0a0a; padding: 8px; border-radius: 8px; border: 1px solid #151515; transition: border-color 0.3s; }
        .settings-group:hover { border-color: #262626; }
        .group-title { margin-bottom: 8px; color: #888; font-size: 0.8em; font-weight: bold; border-bottom: 1px solid #222; padding-bottom: 4px; }
        
        .color-selector { display: flex; gap: 8px; }
        .btn-color { 
            flex: 1; padding: 7px; border: 2px solid #222; border-radius: 6px; 
            cursor: pointer; font-weight: bold; font-size: .85em; transition: 0.2s; 
            background: #111; color: #ddd; display: flex; justify-content: center;
        }
        .btn-color:hover { border-color: var(--accent); background: #1a1a1a; transform: translateY(-1px); }
        .btn-color.active { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,204,.35); }

        .time-ctrl { display: flex; gap: 6px; flex-wrap: wrap; }
        .time-ctrl select { flex: 1; padding: 7px; background: #111; color: #fff; border: 1px solid #333; border-radius: 6px; cursor: pointer; font-size: .8em; outline: none; transition: 0.2s; }
        .time-ctrl select:hover { border-color: #555; }
        .time-ctrl select:focus { border-color: var(--accent); }
        .btn-apply { 
            width: 100%; margin-top: 6px; padding: 6px; background: #1a3a2a; 
            color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; 
            cursor: pointer; font-weight: bold; font-size: .75em; transition: 0.2s; 
        }
        .btn-apply:hover { background: #0a2a1a; box-shadow: 0 0 12px rgba(0,255,204,0.3); transform: translateY(-1px); }
        .btn-apply:active { transform: translateY(0); }

        .status-box { background: #050505; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); text-align: center; margin-top: auto; }
        #status-txt { font-weight: bold; color: var(--accent); font-size: .95em; }

        /* ------------------------------------- */
        /* عناصر لوحة اليمين (سجل النقلات) */
        /* ------------------------------------- */
        .log-title { color: var(--accent); margin: 0 0 15px 0; font-size: 1.1em; text-align: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .log { 
            overflow-y: auto; background: #050505; padding: 12px; 
            font-family: monospace; font-size: 15px; color: #ccc; 
            border: 1px solid #222; border-radius: 8px; flex: 1; 
            scrollbar-width: thin; scrollbar-color: var(--accent) #111;
        }
        .log div { 
            display: flex; align-items: center; gap: 8px; 
            padding: 8px 10px; border-radius: 6px; 
            transition: background 0.2s;
        }
        .log div:nth-child(odd) { background: rgba(255,255,255,0.02); }
        .log div:hover { background: rgba(0,255,204,0.06); }
        .log div:first-child { background: rgba(0,255,204,0.08); }
        .log span { color: #666; min-width: 22px; font-weight: bold; }
        .log b { color: var(--accent); font-weight: normal; }

        /* ------------------------------------- */
        /* التجاوب مع الشاشات الصغيرة (لابتوب/موبايل) */
        /* ------------------------------------- */
        @media(max-width:1300px) {
            .app-container { flex-wrap: wrap; }
            .center-panel { order: -1; width: 100%; margin-bottom: 20px;} /* جعل الرقعة في الأعلى في الشاشات الصغيرة */
            #board { width: calc(100vw - 160px); max-width: 750px; }
            .sidebar { width: calc(50% - 15px); height: 450px; }
        }
        @media(max-width:768px) {
            .sidebar { width: 100%; height: auto; }
            #board { width: calc(100vw - 110px); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- ============================== -->
        <!-- لوحة اليمين (سجل النقلات) -->
        <!-- ============================== -->
        <div class="sidebar right-panel">
            <h3 class="log-title">Move Log</h3>
            <div id="log" class="log"></div>
        </div>

        <!-- ============================== -->
        <!-- المنتصف (الرقعة الكبيرة النظيفة) -->
        <!-- ============================== -->
        <div class="center-panel">
            <div class="board-area">
                <div class="side-clocks">
                    <div class="clock-box" id="clock-top">
                        <div class="clock-label" id="label-top">BLACK (BOT)</div>
                        <div class="clock-time" id="time-top">05:00</div>
                    </div>
                    <div class="clock-box active" id="clock-bottom">
                        <div class="clock-label" id="label-bottom">WHITE (YOU)</div>
                        <div class="clock-time" id="time-bottom">05:00</div>
                    </div>
                </div>
                <div id="board"></div>
            </div>
        </div>

        <!-- ============================== -->
        <!-- لوحة اليسار (الإعدادات والتحدي) -->
        <!-- ============================== -->
        <div class="sidebar left-panel">
            <div class="profile-box">
                <img src="profile.jpg" alt="Profile" class="profile-img">
                <span class="profile-name">GM ELGINDY ZOON</span>
            </div>
            
            <div class="settings-group">
                <div class="group-title">Play as</div>
                <div class="color-selector">
                    <button id="btn-w" class="btn-color active" onclick="setPlayerColor('w')">White ⬜</button>
                    <button id="btn-b" class="btn-color" onclick="setPlayerColor('b')">Black ⬛</button>
                </div>
            </div>

            <div class="settings-group">
                <div class="group-title">Time Control</div>
                <div class="time-ctrl">
                    <select id="time-select">
                        <option value="180">3 min</option>
                        <option value="300" selected>5 min</option>
                        <option value="600">10 min</option>
                        <option value="0">No limit</option>
                    </select>
                    <select id="inc-select">
                        <option value="0">+0 s</option>
                        <option value="2">+2 s</option>
                        <option value="5">+5 s</option>
                    </select>
                    <button class="btn-apply" onclick="applyTimeControl()">Apply & New Game</button>
                </div>
            </div>

            <div class="status-box">
                <div id="status-txt">Loading engine...</div>
                <button class="btn-apply" id="btn-save-pgn" onclick="saveGamePGN()" style="margin-top:8px;">💾 Save Game</button>
            </div>
        </div>
    </div>

    <!-- السكربتات الخاصة بالشطرنج -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

    <script>
    // ════════════════════════════════════════
    // نظام الأصوات
    // ════════════════════════════════════════
    var audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function makeBeep(freq, dur, vol) {
        try {
            initAudio();
            var o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = freq; o.type = 'sine';
            g.gain.setValueAtTime(vol || 0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            o.start(); o.stop(audioCtx.currentTime + dur);
        } catch(e) {}
    }
    var sfx = {
        move:    function() { makeBeep(440, 0.08, 0.25); },
        capture: function() { makeBeep(220, 0.18, 0.4); setTimeout(function(){ makeBeep(180, 0.12, 0.25); }, 80); },
        check:   function() { makeBeep(600, 0.1, 0.4); setTimeout(function(){ makeBeep(700, 0.15, 0.35); }, 110); },
        end:     function() { [500,400,300].forEach(function(f,i){ setTimeout(function(){ makeBeep(f, 0.25, 0.4); }, i*200); }); }
    };

    // ════════════════════════════════════════
    // متغيرات اللعبة الأساسية
    // ════════════════════════════════════════
    var board = null, game = new Chess();
    var engine = null, botDepth = 12;
    var playerColor = 'w'; 
    var totalTime = 300, increment = 0;
    var timers = { w: 300, b: 300 }, activeColor = 'w';
    var timerStartTS = null, clockInterval = null;

    // ════════════════════════════════════════
    // تهيئة محرك Stockfish
    // ════════════════════════════════════════
    function initEngine() {
        var stockfishUrl = 'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js';
        fetch(stockfishUrl)
            .then(function(response) { return response.text(); })
            .then(function(script) {
                var blob = new Blob([script], { type: 'application/javascript' });
                engine = new Worker(URL.createObjectURL(blob));
                engine.onmessage = function(event) {
                    var line = event.data;
                    if (line && typeof line === 'string' && line.indexOf('bestmove') > -1) {
                        var match = line.match(/^bestmove ([a-h][1-8])([a-h][1-8])([qrbn])?/);
                        if (match) makeBotMove(match[1], match[2], match[3]);
                    }
                };
                engine.postMessage('uci');
                engine.postMessage('isready');
                resetGame();
            })
            .catch(function() { $("#status-txt").text('⚠ Failed to load engine'); });
    }

    // ════════════════════════════════════════
    // التحكم في اللعبة
    // ════════════════════════════════════════
    function setPlayerColor(color) {
        initAudio();
        playerColor = color;
        $('.btn-color').removeClass('active');
        $('#btn-' + color).addClass('active');
        
        board.orientation(color === 'w' ? 'white' : 'black');
        
        if(color === 'w') {
            $('#label-top').text('BLACK (BOT)');
            $('#label-bottom').text('WHITE (YOU)');
        } else {
            $('#label-top').text('WHITE (BOT)');
            $('#label-bottom').text('BLACK (YOU)');
        }
        resetGame();
    }

    function saveGamePGN() {
        var pgn = game.pgn();
        if (!pgn) { alert('No moves to save yet!'); return; }
        var now = new Date();
        var pad = function(n) { return n.toString().padStart(2, '0'); };
        var filename = 'game_' + now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) +
            '_' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds()) + '.pgn';

        var blob = new Blob([pgn], { type: 'application/x-chess-pgn' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function resetGame() {
        game = new Chess();
        $("#log").empty();
        moveCount = 1;
        board.position(game.fen());
        resetTimers();
        updateUI();
        if (playerColor === 'b') setTimeout(askBotToMove, 400);
    }

    function onDragStart(source, piece) {
        if (game.game_over()) return false;
        if ((playerColor === 'w' && piece.search(/^b/) !== -1) ||
            (playerColor === 'b' && piece.search(/^w/) !== -1)) return false;
        if (game.turn() !== playerColor) return false;
    }

    function onDrop(source, target) {
        var move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';

        addLog(move.san, playerColor);
        playMoveSound(move.flags, game.in_check());
        switchClock();
        updateUI();

        if (game.game_over()) { sfx.end(); stopClock(); } 
        else setTimeout(askBotToMove, 250);
    }

    function onSnapEnd() { board.position(game.fen()); }
    window.onSnapEnd = onSnapEnd;

    function askBotToMove() {
        if (game.game_over() || !engine) return;
        engine.postMessage('position fen ' + game.fen());
        engine.postMessage('go depth ' + botDepth);
    }

    function makeBotMove(fromSquare, toSquare, promotionPiece) {
        var move = game.move({ from: fromSquare, to: toSquare, promotion: promotionPiece || 'q' });
        if (move) {
            board.position(game.fen());
            var botColor = playerColor === 'w' ? 'b' : 'w';
            addLog(move.san, botColor);
            playMoveSound(move.flags, game.in_check());
            switchClock();
            updateUI();
            if (game.game_over()) { sfx.end(); stopClock(); }
        }
    }

    function playMoveSound(flags, inCheck) {
        if (game.in_checkmate()) sfx.end();
        else if (inCheck) sfx.check();
        else if (flags && (flags.includes('c') || flags.includes('e'))) sfx.capture();
        else sfx.move();
    }

    // سجل نقلات عادي بصيغة نوتيشن قياسية: رقم + نقلة أبيض + نقلة أسود في نفس السطر
    var moveCount = 1;
    function addLog(san, color) {
        if (color === 'w') {
            $("#log").prepend(`<div><span style="color:#555;">${moveCount}.</span> <b>${san}</b></div>`);
        } else {
            $("#log div").first().append(` ${san}`);
            moveCount++;
        }
    }

    function updateUI() {
        var isPlayerTurn = game.turn() === playerColor;
        var status = isPlayerTurn ? 'Your turn' : 'Computer is thinking...';
        
        if (game.in_checkmate()) status = isPlayerTurn ? 'Checkmate! Computer wins.' : 'Checkmate! You win.';
        else if (game.in_draw() || game.in_stalemate() || game.in_threefold_repetition()) status = 'Draw!';
        
        $("#status-txt").text(status);
        var topActive = (playerColor === 'w' && game.turn() === 'b') || (playerColor === 'b' && game.turn() === 'w');
        $('#clock-top').toggleClass('active', topActive).removeClass('low');
        $('#clock-bottom').toggleClass('active', !topActive).removeClass('low');
    }

    function applyTimeControl() {
        initAudio();
        totalTime = parseInt($('#time-select').val());
        increment = parseInt($('#inc-select').val());
        resetGame();
    }

    function resetTimers() {
        stopClock();
        timers = { w: totalTime, b: totalTime };
        activeColor = 'w'; timerStartTS = null;
        renderClocks();
        if (totalTime > 0) { timerStartTS = Date.now(); clockInterval = setInterval(tickClock, 100); }
    }

    function stopClock() {
        if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
    }

    function switchClock() {
        if (totalTime === 0) return;
        if (timerStartTS !== null) {
            var elapsed = (Date.now() - timerStartTS) / 1000;
            timers[activeColor] = Math.max(0, timers[activeColor] - elapsed) + increment;
            renderClocks();
        }
        activeColor = (activeColor === 'w') ? 'b' : 'w';
        timerStartTS = Date.now();
    }

    function tickClock() {
        if (timerStartTS === null) return;
        var elapsed = (Date.now() - timerStartTS) / 1000;
        var remaining = Math.max(0, timers[activeColor] - elapsed);
        
        var updateTop = (activeColor === 'b' && playerColor === 'w') || (activeColor === 'w' && playerColor === 'b');
        renderSingleClock(updateTop ? 'top' : 'bottom', remaining);
        
        if (remaining < 30) $('#clock-' + (updateTop ? 'top' : 'bottom')).addClass('low');
        if (remaining <= 0) {
            stopClock(); timers[activeColor] = 0; sfx.end();
            var winner = (activeColor === playerColor) ? 'Computer' : 'You';
            $("#status-txt").text('Time\'s up! ' + winner + ' wins.');
        }
    }

    function renderClocks() {
        if (totalTime === 0) { $('#time-top, #time-bottom').text('∞'); return; }
        var myTime = timers[playerColor], botTime = playerColor === 'w' ? timers['b'] : timers['w'];
        renderSingleClock('bottom', myTime); renderSingleClock('top', botTime);
    }

    function renderSingleClock(position, secs) {
        if (totalTime === 0) return;
        var m = Math.floor(secs / 60).toString().padStart(2, '0');
        var s = Math.floor(secs % 60).toString().padStart(2, '0');
        $('#time-' + position).text(m + ':' + s);
    }

    // تحديث حجم الرقعة عند تغيير حجم النافذة
    $(window).resize(function() {
        if(board) board.resize();
    });

    $(document).ready(function() {
        board = Chessboard('board', {
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            draggable: true,
            position: 'start',
            onDragStart: function(source, piece, position, orientation) { return window.onDragStart(source, piece, position, orientation); },
            onDrop: function(source, target) { return window.onDrop(source, target); },
            onSnapEnd: function() { return window.onSnapEnd(); }
        });
        initEngine();
    });
    </script>
    <!-- استدعاء ملف الافتتاح المجبر للمحرك -->
    <script src="opening.js"></script>
</body>
</html>
